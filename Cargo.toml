[package]
name = "jwm"
version = "0.2.0"
edition = "2024"

[features]
egui_bar = []
iced_bar = []
dioxus_bar = []
tauri_react_bar = []
tauri_vue_bar = []
gtk_bar = []
relm_bar = []
x11rb_bar = []
xcb_bar = []
winit_softbuffer_bar = []
tao_softbuffer_bar = []
winit_pixels_bar = []
tao_pixels_bar = []
winit_wgpu_bar = []
tao_wgpu_bar = []
nixgl = []
cairo = []

[[bin]]
name = "jwm-tool"
path = "tools/jwm_tool.rs"

[dependencies]
clap = { version = "4.5.48", features = ["derive", "env"] }
dirs = "6.0.0"
dirs-next = "2.0.0"
fastrand = "2.3.0"
glob = "0.3.3"
signal-hook = "0.3.18"
slotmap = { version = "1.0.7", features = ["serde"] }
x11 = { version = "2.21.0", features = ["glx", "xlib", "xlib_xcb", "xcursor", "xfixes", "xinput", "xrandr", "xrender", "dpms", "xf86vmode"] }
x11rb = { version = "0.13.2", features = ["all-extensions"] }
x11rb-protocol = "0.13.2"

libc = "0.2.176"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.47.1", features = ["full"] }
bincode = { version = "2.0.1", features = ["derive", "serde"] }
shared_structures = { git = "https://github.com/beamiter/shared_structures.git", features = ["use-futex"] }
chrono = "0.4.42"
log = "0.4.28"
toml = "0.9.7"
xbar_core = { git = "https://github.com/beamiter/xbar_core.git" }
nix = { version = "0.30.1", features = ["signal"] }
cfg-if = "1.0.3"
lazy_static = "1.5.0"
once_cell = "1.21.3"
arc-swap = "1"
rand = "0.9.2"
xkbcommon = "0.9.0"
bitflags = "2.9.4"
smithay = { git = "https://github.com/Smithay/smithay.git", rev = "b252c0fa644222be1234904542ff1773cbfefc14", default-features = false, features = [
"use_system_lib",
"wayland-backend",
"wayland_frontend",
"backend_x11",
"backend_winit",
"backend_udev",
"backend_libinput",
"backend_session_libseat",
"backend_drm",
"backend_gbm",
"backend_egl",
"renderer_gl",
"desktop",
"xwayland",
] }
calloop = { version = "0.14.3", features = ["signals"] }
glow = "0.16"
winit = "0.30.12"
crossbeam-channel = "0.5.15"
downcast-rs = "2.0.2"
png = "0.17"
xcursor = "0.3.10"
tracing = "0.1.41"
drm = "0.14.1"
libseat = "0.2.4"
gbm = "0.18.0"
egl = "0.2.7"

[build-dependencies]
bindgen = "0.72.1"
pkg-config = "0.3"

[[bench]]
name = "wm_benchmark"
harness = false
