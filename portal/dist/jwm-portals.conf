[preferred]
default=jwm
org.freedesktop.impl.portal.ScreenCast=jwm

# xdg-desktop-portal reads this file when XDG_CURRENT_DESKTOP matches the
# basename without `-portals.conf`. The jwm session sets DesktopNames=JWM
# (see jwm-wayland.desktop), so the matching filename is `JWM-portals.conf`.
# Install copies this under both casings to be defensive.
