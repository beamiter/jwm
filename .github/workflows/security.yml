name: Supply-chain security

on:
  pull_request:
    branches:
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/security.yml
  push:
    branches:
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/security.yml
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: RustSec audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo audit installation and advisory database
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
          key: cargo-audit-0.22.2-${{ runner.os }}

      - name: Install cargo-audit 0.22.2
        shell: bash
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --version 0.22.2 --locked
          fi

      - name: Audit the locked Rust dependency graph
        id: audit
        shell: bash
        run: |
          set +e
          cargo audit --file Cargo.lock --json > cargo-audit.json 2> cargo-audit.stderr
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [[ -s cargo-audit.stderr ]]; then
            cat cargo-audit.stderr
          fi
          exit 0

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-${{ github.run_id }}
          path: |
            cargo-audit.json
            cargo-audit.stderr
          if-no-files-found: error
          retention-days: 14

      - name: Fail on vulnerable dependencies or audit errors
        if: steps.audit.outputs.status != '0'
        run: exit 1
