name: Supply-chain security

on:
  pull_request:
    branches:
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/security.yml
  push:
    branches:
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/security.yml
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pull-request-audit:
    if: github.event_name == 'pull_request'
    name: RustSec audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Audit the locked Rust dependency graph
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  default-branch-audit:
    if: github.event_name != 'pull_request'
    name: RustSec audit and advisory issue sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Audit the locked Rust dependency graph
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
