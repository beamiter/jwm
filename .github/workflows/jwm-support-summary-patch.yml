name: Apply support summary privacy fix

on:
  push:
    branches:
      - agent/jwm-evolution-foundation
    paths:
      - .github/workflows/jwm-support-summary-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out evolution branch
        uses: actions/checkout@v4
        with:
          ref: agent/jwm-evolution-foundation
          fetch-depth: 0

      - name: Install Rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply privacy patch
        run: python3 scripts/.jwm_support_summary_patch.py

      - name: Format Rust source
        run: cargo fmt --all

      - name: Commit the final source and remove migration files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/jwm_support.rs
          git rm scripts/.jwm_support_summary_patch.py
          git rm .github/workflows/jwm-support-summary-patch.yml
          git commit -m "fix: redact configured status-bar paths in support bundles"
          git push
