name: Generate Cargo lockfile

on:
  pull_request:
    branches:
      - master
    paths:
      - Cargo.toml
      - rust-toolchain.toml
      - .github/workflows/lockfile-artifact.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lockfile-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Resolve dependency lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Upload Cargo.lock
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lock
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 1
