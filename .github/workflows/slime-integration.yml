name: Slime compositor integration

on:
  push:
    branches:
      - feature/slime-hand-effect
    paths:
      - tools/integrate_slime_effect.py
      - src/backend/x11/compositor/slime.rs
      - .github/workflows/slime-integration.yml
  pull_request:
    branches:
      - master
    paths:
      - tools/integrate_slime_effect.py
      - src/backend/x11/compositor/slime.rs
      - .github/workflows/slime-integration.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: slime-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/slime-hand-effect

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libasound2-dev \
            libdbus-1-dev \
            libudev-dev \
            libinput-dev \
            libseat-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxxf86vm-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply guarded integration edits
        run: python3 tools/integrate_slime_effect.py

      - name: Format Rust sources
        run: cargo fmt --all

      - name: Check all targets
        id: cargo_check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cargo check --all-targets 2>&1 | tee slime-cargo-check.log

      - name: Upload cargo diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slime-cargo-check
          path: slime-cargo-check.log
          if-no-files-found: error
          retention-days: 3

      - name: Commit generated integration
        if: steps.cargo_check.outcome == 'success'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Integration already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/backend/x11/compositor
          git commit -m "feat(slime): wire realtime hand refraction into X11 compositor"
          git push origin HEAD:feature/slime-hand-effect

      - name: Fail when cargo check failed
        if: steps.cargo_check.outcome != 'success'
        run: exit 1
