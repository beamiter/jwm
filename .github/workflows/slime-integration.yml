name: Slime compositor formatting

on:
  push:
    branches:
      - feature/slime-hand-effect
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: slime-format-branch
  cancel-in-progress: false

jobs:
  format-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/slime-hand-effect
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libasound2-dev \
            libdbus-1-dev \
            libudev-dev \
            libinput-dev \
            libseat-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxxf86vm-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format slime module
        run: rustfmt --edition 2024 src/backend/x11/compositor/slime.rs

      - name: Check tracker scripts
        run: python3 -m py_compile tools/slime_tracker.py tools/slime_pose_demo.py

      - name: Check production targets and tests
        run: |
          cargo check --lib --bins --tests
          cargo test --lib slime

      - name: Commit formatted module
        shell: bash
        run: |
          if git diff --quiet -- src/backend/x11/compositor/slime.rs; then
            echo "Slime module already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/backend/x11/compositor/slime.rs
          git commit -m "style(slime): format compositor state module"
          git push origin HEAD:feature/slime-hand-effect
