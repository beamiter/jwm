name: Slime compositor validation

on:
  push:
    branches:
      - feature/slime-hand-effect
    paths:
      - src/backend/x11/compositor/**
      - tools/slime_*.py
      - tools/validate_slime_shaders.py
      - docs/slime-hand-effect.md
      - .github/workflows/slime-integration.yml
  pull_request:
    branches:
      - master
    paths:
      - src/backend/x11/compositor/**
      - tools/slime_*.py
      - tools/validate_slime_shaders.py
      - docs/slime-hand-effect.md
      - .github/workflows/slime-integration.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: slime-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            glslang-tools \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libasound2-dev \
            libdbus-1-dev \
            libudev-dev \
            libinput-dev \
            libseat-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxxf86vm-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check slime module formatting
        run: |
          rustfmt --edition 2024 --check \
            src/backend/x11/compositor/slime.rs \
            src/backend/x11/compositor/types.rs \
            src/backend/x11/compositor/init.rs \
            src/backend/x11/compositor/render.rs \
            src/backend/x11/compositor/postprocess.rs \
            src/backend/x11/compositor/common/shaders.rs

      - name: Check tracker scripts
        run: |
          python3 -m py_compile \
            tools/slime_tracker.py \
            tools/slime_pose_demo.py \
            tools/validate_slime_shaders.py

      - name: Compile embedded slime shaders
        run: python3 tools/validate_slime_shaders.py

      - name: Check production targets and tests
        run: |
          # The existing wm_benchmark target imports Criterion without declaring
          # it as a dev-dependency, so validate library, binaries, and tests here.
          cargo check --lib --bins --tests

      - name: Run slime state tests
        run: cargo test --lib slime
