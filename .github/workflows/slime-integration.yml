name: Slime compositor integration

on:
  push:
    branches:
      - feature/slime-hand-effect
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: slime-integration-branch
  cancel-in-progress: false

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/slime-hand-effect

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libasound2-dev \
            libdbus-1-dev \
            libudev-dev \
            libinput-dev \
            libseat-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxxf86vm-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-damage0-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply fade-state fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/backend/x11/compositor/slime.rs")
          text = path.read_text(encoding="utf-8")
          old = '''    fn begin_fade(&mut self) {
              if self.last_update.is_some() {
                  let now = Instant::now();
                  self.last_update = Some(now.checked_sub(HOLD_TIME).unwrap_or(now));
              }
          }
          '''
          new = '''    fn begin_fade(&mut self) {
              let Some(last) = self.last_update else {
                  return;
              };
              // Trackers commonly send an inactive packet every frame while no
              // hand is visible. Start the fade once, but never restart it from
              // full opacity on each repeated inactive packet.
              if last.elapsed() < HOLD_TIME {
                  let now = Instant::now();
                  self.last_update = Some(now.checked_sub(HOLD_TIME).unwrap_or(now));
              }
          }
          '''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit("fade-state patch anchor changed")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Add repeated-inactive regression test
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/backend/x11/compositor/slime.rs")
          text = path.read_text(encoding="utf-8")
          marker = "fn repeated_inactive_packets_do_not_restart_fade()"
          if marker not in text:
              anchor = '''    #[test]
              fn begin_fade_keeps_a_short_transition() {
                  let mut state = SlimeState::default();
                  state.last_update = Some(Instant::now());
                  state.begin_fade();
                  assert!(state.opacity() > 0.9);
                  assert!(state.is_visible());
              }
          '''
              replacement = anchor + '''
              #[test]
              fn repeated_inactive_packets_do_not_restart_fade() {
                  let mut state = SlimeState::default();
                  state.last_update = Some(Instant::now());
                  state.begin_fade();
                  state.last_update = state
                      .last_update
                      .map(|last| last - Duration::from_millis(80));
                  let opacity_before = state.opacity();
                  state.begin_fade();
                  assert!(state.opacity() <= opacity_before + 0.02);
              }
          '''
              if text.count(anchor) != 1:
                  raise SystemExit("slime test patch anchor changed")
              path.write_text(text.replace(anchor, replacement, 1), encoding="utf-8")
          PY

      - name: Format and validate
        run: |
          cargo fmt --all
          cargo check --lib --bins --tests
          cargo test --lib repeated_inactive_packets_do_not_restart_fade

      - name: Commit fade fix
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Fade fix already present"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/backend/x11/compositor/slime.rs
          git commit -m "fix(slime): do not restart fade on repeated inactive poses"
          git push origin HEAD:feature/slime-hand-effect
