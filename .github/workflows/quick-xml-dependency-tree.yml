name: Inspect quick-xml dependency chains

on:
  push:
    branches:
      - agent/jwm-evolution-foundation
    paths:
      - .github/workflows/quick-xml-dependency-tree.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out evolution branch
        uses: actions/checkout@v4
        with:
          ref: agent/jwm-evolution-foundation
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Capture reverse dependency trees
        shell: bash
        run: |
          {
            echo '=== quick-xml 0.30.0 ==='
            cargo tree --locked -i quick-xml@0.30.0
            echo
            echo '=== quick-xml 0.39.4 ==='
            cargo tree --locked -i quick-xml@0.39.4
            echo
            echo '=== cgmath 0.18.0 ==='
            cargo tree --locked -i cgmath@0.18.0
          } | tee dependency-trees.txt

      - name: Upload dependency trees
        uses: actions/upload-artifact@v4
        with:
          name: quick-xml-dependency-trees-${{ github.run_id }}
          path: dependency-trees.txt
          if-no-files-found: error
          retention-days: 1

      - name: Remove inspection workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/quick-xml-dependency-tree.yml
          git commit -m "ci: remove quick-xml dependency inspection workflow"
          git push
