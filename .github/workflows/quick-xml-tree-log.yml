name: Persist vulnerable dependency chains

on:
  push:
    branches:
      - agent/jwm-evolution-foundation
    paths:
      - .github/workflows/quick-xml-tree-log.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inspect:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out evolution branch
        uses: actions/checkout@v4
        with:
          ref: agent/jwm-evolution-foundation
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Capture reverse dependency trees
        shell: bash
        run: |
          {
            echo '=== quick-xml 0.30.0 ==='
            cargo tree --locked -i quick-xml@0.30.0
            echo
            echo '=== quick-xml 0.39.4 ==='
            cargo tree --locked -i quick-xml@0.39.4
            echo
            echo '=== cgmath 0.18.0 ==='
            cargo tree --locked -i cgmath@0.18.0
          } > dependency-trees.txt
          cat dependency-trees.txt

      - name: Commit the diagnostic and remove the workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dependency-trees.txt
          git rm .github/workflows/quick-xml-tree-log.yml
          git commit -m "ci: capture vulnerable dependency chains"
          git push
