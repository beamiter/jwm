# 后端选择 (推荐使用 glx 以获得最佳性能和效果)
backend = "glx";

# 启用/禁用淡入淡出效果
# JWM: [behavior] fading = true, fade_in_step = 0.03, fade_out_step = 0.03
fading = true;
fade-in-step = 0.3;
fade-out-step = 0.3;

# 启用/禁用阴影
# JWM: [behavior] shadow_enabled = true, shadow_radius, shadow_offset, shadow_color
shadow = true;
shadow-radius = 12;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.55;

# 为特定窗口类禁用阴影 (例如，状态栏、终端)
# JWM: [behavior] shadow_exclude = ["Alacritty", "kitty"]
shadow-exclude = [
    "class_g = 'Alacritty'",
    "class_g = 'kitty'",
    "_GTK_FRAME_EXTENTS@:c"
];

# 启用/禁用圆角
# JWM: [behavior] corner_radius = 10
corner-radius = 10;
round-borders = true;

# 为特定窗口类禁用圆角
# JWM: [behavior] rounded_corners_exclude = ["..."]
rounded-corners-exclude = [
    "_GTK_FRAME_EXTENTS@:c"
];

# 透明度设置
# JWM: [behavior] inactive_opacity = 0.98, active_opacity = 1.0
inactive-opacity = 0.98;
active-opacity = 1.0;
frame-opacity = 1.0;

# 为特定窗口设置不透明度
# JWM: [behavior] opacity_rules = ["90:Alacritty", "90:kitty"]
opacity-rule = [
    "90:class_g = 'Alacritty'",
    "90:class_g = 'kitty'"
];

# 性能优化
# JWM: vsync 默认启用 (glXSwapIntervalEXT)
vsync = true; # 防止撕裂
# JWM: damage-driven 更新默认启用
use-damage = true; # 减少不必要的重绘
# JWM: [behavior] detect_client_opacity = true
detect-rounded-corners = true;
detect-client-opacity = true;

# 模糊效果
# JWM: [behavior] blur_enabled = true, blur_strength = 3
# blur-method = "dual_kawase";
# blur-strength = 3;

# 排除全屏窗口以获得最佳性能
# JWM: [behavior] blur_exclude = ["fullscreen_class"]
blur-background-exclude = [
    "fullscreen"
];

# 全屏窗口直通优化
# JWM: [behavior] fullscreen_unredirect = true
# unredir-if-possible = true;
