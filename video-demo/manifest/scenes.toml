[profiles]
smoke = ["layout-tile", "layout-grid", "layout-scrolling"]
layouts = ["layout-tile", "layout-float", "layout-monocle", "layout-fibonacci", "layout-centeredmaster", "layout-bstack", "layout-grid", "layout-deck", "layout-threecol", "layout-tatami", "layout-fullscreen", "layout-scrolling", "layout-vstack"]
window-management = ["wm-focus-order", "wm-factors", "wm-floating", "wm-sticky", "wm-pip"]
tags = ["tags-move-window"]
stage2 = ["layout-tile", "layout-float", "layout-monocle", "layout-fibonacci", "layout-centeredmaster", "layout-bstack", "layout-grid", "layout-deck", "layout-threecol", "layout-tatami", "layout-fullscreen", "layout-scrolling", "layout-vstack", "wm-focus-order", "wm-factors", "wm-floating", "wm-sticky", "wm-pip", "tags-move-window"]
compositor-basic = ["effect-rounded", "effect-shadow", "effect-blur", "effect-fade"]
compositor-pointer = ["effect-wobbly", "effect-motion-trail"]
compositor-interactive = ["effect-overview", "effect-magnifier", "effect-annotation"]
stage3 = ["effect-rounded", "effect-shadow", "effect-blur", "effect-fade", "effect-wobbly", "effect-motion-trail", "effect-overview", "effect-magnifier", "effect-annotation"]

[[scene]]
id = "layout-tile"
title = "Tile 主从布局"
layout = "tile"
windows = 6
duration = 5.0
status = "ready"
narration = "Tile 使用清晰的主区和堆栈区组织窗口，并支持焦点、比例和顺序调整。"
assertions = ["focus_changed", "m_fact_changed"]
actions = [
  { command = "focus_demo", args = { value = 1 }, hold = 0.6 },
  { command = "setmfact", args = { value = 0.05 }, hold = 0.7 },
  { command = "movestack", args = { value = 1 }, hold = 0.7 },
]

[[scene]]
id = "layout-float"
title = "Float 浮动布局"
layout = "float"
windows = 5
duration = 4.0
status = "ready"
narration = "Float 保留应用窗口的自由位置，同时仍由 JWM 管理焦点和标签。"
assertions = ["focus_changed"]
actions = [{ command = "focus_demo", args = { value = 1 }, hold = 1.0 }]

